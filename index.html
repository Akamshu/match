    text-align: center;
    margin: 0;
  }

  .container {

  }
  .form-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 15px;
  }
  input[type="text"], select, input[type="file"], input[list], input[type="number"] {
    width: 100%;
    padding: 14px 12px;
    font-size: 16px;
    border: 2px solid #ccc;
    border-radius: 8px;
    background-color: white;
    color: #333;
    outline: none;
    transition: all 0.3s ease;
  }
  input:focus {
    border-color: #1976d2;
    box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.2);
  }
  
  button {
    width: 48%;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #27ae60;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
  }
  button:hover { background-color: #1e8d4d; transform: scale(1.03); }
  canvas {
    margin-top: 30px;
    border-radius: 12px;
    max-width: 100%;
    width: 100%;
    border: 2px solid #fff;
  }
  @media (max-width: 600px) {
    .form-group { grid-template-columns: 1fr; }

</style>

function loadImage(file, callback) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => callback(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadLogo(team, callback) {
  const path = teamLogos[team];
  if (!path) { callback(null); return; }
  const img = new Image();
  img.onload = () => callback(img);
  img.src = path;
}

document.getElementById("imageUploader").addEventListener("change", e => {
  loadImage(e.target.files[0], img => {
    uploadedImage = img;
    resizeCanvasToImage(img);
    render();
  });
});

document.getElementById("player1").addEventListener("change", e => {
  loadImage(e.target.files[0], img => { player1Img = img; render(); });
});
document.getElementById("player2").addEventListener("change", e => {
  loadImage(e.target.files[0], img => { player2Img = img; render(); });
});

document.getElementById("homeTeam").addEventListener("input", e => {
  loadLogo(e.target.value, img => { homeLogo = img; render(); });
});
document.getElementById("awayTeam").addEventListener("input", e => {
  loadLogo(e.target.value, img => { awayLogo = img; render(); });
});

document.querySelectorAll("#homeScore, #awayScore")
  .forEach(input => input.addEventListener("input", render));

function resizeCanvasToImage(img) {
  canvas.width = img.width;
  canvas.height = img.height;
}

// DRAW TEXT HELPER
function drawTextCentered(text, y, fontSize, color = "white") {
  ctx.font = `${fontSize}px Anton`;
  ctx.textAlign = "center";
  ctx.fillStyle = color;
  ctx.strokeStyle = "black";
  ctx.lineWidth = 6;
  ctx.strokeText(text, canvas.width / 2, y);
  ctx.fillText(text, canvas.width / 2, y);
}

function drawImageContain(ctx, img, x, y, w, h, margin = 15) {
  const availableW = w - margin * 2;
  const availableH = h - margin * 2;

  const scale = Math.min(
    availableW / img.width,
    availableH / img.height
  );

  const drawW = img.width * scale;
  const drawH = img.height * scale;

  const drawX = x + (w - drawW) / 2;
  const drawY = y + (h - drawH) / 2;

  ctx.drawImage(
    img,
    drawX,
    drawY,
    drawW,
    drawH
  );
}
 
// MERGED RENDER FUNCTION
function render() {
  if (!uploadedImage) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(uploadedImage, 0, 0, canvas.width, canvas.height);

// --- SCOREBOARD BACKGROUND ---
// Make scoreboard smaller
const logoBoxSize = canvas.height * 0.3;   // ⬆️ logos slightly bigger
const boardHeight = logoBoxSize * 1.2;      // ⬇️ scoreboard smaller
const boardY = canvas.height * 0.55 - boardHeight / 2;
const boardX = canvas.width * 0.25;
const boardWidth = canvas.width * 0.5;


const gradient = ctx.createLinearGradient(boardX, 0, boardX + boardWidth, 0);
gradient.addColorStop(0, "#00c853");  
gradient.addColorStop(1, "#00e5ff");  

ctx.fillStyle = gradient;
ctx.beginPath();
ctx.roundRect(boardX, boardY, boardWidth, boardHeight, 15);
ctx.fill();


// --- TEAM LOGO BOXES ---
const homeTeam = document.getElementById("homeTeam").value;
const awayTeam = document.getElementById("awayTeam").value;
const logoY = boardY + (boardHeight - logoBoxSize) / 2;
const logoPadding = logoBoxSize * 0.15;
 const logoAreaHeight = logoBoxSize * 0.80;
const nameAreaHeight = logoBoxSize * 0.20;

// ======================================
// HOME TEAM BOX
// ======================================

const homeLogoX = boardX + boardWidth * 0.05 - logoBoxSize / 2;

// Main box
ctx.fillStyle = "white";
ctx.beginPath();
ctx.roundRect(
  homeLogoX,
  logoY,
  logoBoxSize,
  logoBoxSize,
  20
);
ctx.fill();

// Logo Area (85%)
if (homeLogo) {
  drawImageContain(
    ctx,
    homeLogo,
    homeLogoX,
    logoY,
    logoBoxSize,
    logoAreaHeight,
    logoBoxSize * 0.05
  );
}

// Name Area Background (15%)
ctx.fillStyle = "#38003c";
ctx.beginPath();
ctx.roundRect(
  homeLogoX,
  logoY + logoAreaHeight,
  logoBoxSize,
  nameAreaHeight,
  [0, 0, 20, 20]
);
ctx.fill();

// Divider
ctx.strokeStyle = "#ffffff";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(homeLogoX, logoY + logoAreaHeight);
ctx.lineTo(homeLogoX + logoBoxSize, logoY + logoAreaHeight);
ctx.stroke();

// Home Team Name
ctx.font = `bold ${Math.max(canvas.width * 0.020, 55)}px Anton`;
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.lineWidth = 6;
ctx.strokeStyle = "#38003c";
ctx.fillStyle = "white";

const homeNameY =
  logoY + logoAreaHeight + nameAreaHeight / 2;

ctx.strokeText(
  teamShortNames[homeTeam] || homeTeam,
  homeLogoX + logoBoxSize / 2,
  homeNameY
);

ctx.fillText(
  teamShortNames[homeTeam] || homeTeam,
  homeLogoX + logoBoxSize / 2,
  homeNameY
);


// ======================================
// AWAY TEAM BOX
// ======================================

const awayLogoX = boardX + boardWidth * 0.95 - logoBoxSize / 2;

// Main box
ctx.fillStyle = "white";
ctx.beginPath();
ctx.roundRect(
  awayLogoX,
  logoY,
  logoBoxSize,
  logoBoxSize,
  20
);
ctx.fill();

// Logo Area (85%)
if (awayLogo) {
  drawImageContain(
    ctx,
    awayLogo,
    awayLogoX,
    logoY,
    logoBoxSize,
    logoAreaHeight,
    logoBoxSize * 0.05
  );
}

// Name Area Background (15%)
ctx.fillStyle = "#38003c";
ctx.beginPath();
ctx.roundRect(
  awayLogoX,
  logoY + logoAreaHeight,
  logoBoxSize,
  nameAreaHeight,
  [0, 0, 20, 20]
);
ctx.fill();

// Divider
ctx.strokeStyle = "#ffffff";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(awayLogoX, logoY + logoAreaHeight);
ctx.lineTo(awayLogoX + logoBoxSize, logoY + logoAreaHeight);
ctx.stroke();

// Away Team Name
ctx.font = `bold ${Math.max(canvas.width * 0.020, 55)}px Anton`;
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.lineWidth = 6;
ctx.strokeStyle = "#38003c";
ctx.fillStyle = "white";

const awayNameY =
  logoY + logoAreaHeight + nameAreaHeight / 2;

ctx.strokeText(
  teamShortNames[awayTeam] || awayTeam,
  awayLogoX + logoBoxSize / 2,
  awayNameY
);

ctx.fillText(
  teamShortNames[awayTeam] || awayTeam,
  awayLogoX + logoBoxSize / 2,
  awayNameY
);



  // --- SCORES ---
  let homeScore = document.getElementById("homeScore").value || "0";
  let awayScore = document.getElementById("awayScore").value || "0";

  ctx.font = `${Math.max(canvas.width * 0.08, 90)}px Anton`;
  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(`${homeScore} - ${awayScore}`, canvas.width / 2, boardY + boardHeight / 2);

  let resultText = "";
if (homeScore > awayScore) resultText = "HOME WIN";
else if (homeScore < awayScore) resultText = "AWAY WIN";
else resultText = "DRAW";

ctx.font = `${Math.max(canvas.width * 0.025, 20)}px Anton`;
ctx.fillStyle = "white";
ctx.fillText(resultText, canvas.width / 2, boardY + boardHeight -120);


ctx.font = "155px Anton";
ctx.fillStyle = "rgba(255,255,255,0.3)";
ctx.fillText("KPONKIUS GRAPHICS", canvas.width - 200, canvas.height - 20);

// --- FULL TIME BOX ---
const fullTimeBoxHeight = boardHeight * 0.3; 
const fullTimeBoxWidth = boardWidth * 0.4;
const fullTimeX = canvas.width / 2 - fullTimeBoxWidth / 2;
const fullTimeY = boardY - fullTimeBoxHeight + 200; // spacing above scoreboard

// White rounded rectangle
ctx.fillStyle = "white";
ctx.beginPath();
ctx.roundRect(fullTimeX, fullTimeY, fullTimeBoxWidth, fullTimeBoxHeight, 30);
ctx.fill();

// Text "FULL TIME"
ctx.font = `${Math.max(canvas.width * 0.020, 35)}px Anton`;
ctx.fillStyle = "#000";  
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText("FULL TIME", canvas.width / 2, fullTimeY + fullTimeBoxHeight / 2);



 
}

// Change competition background
document.getElementById("competitionSelect").addEventListener("change", e => {
  const selected = e.target.value;
  const path = competitionBackgrounds[selected];
  if (path) {
    const img = new Image();
    img.onload = function() {
      uploadedImage = img;
      resizeCanvasToImage(img);
      render();
    };
    img.src = path;
  }
});

// Default background (Premier League)
window.onload = function() {
  const img = new Image();
  img.onload = function() {
    uploadedImage = img;
    resizeCanvasToImage(img);
    render();
  };
  img.src = competitionBackgrounds.premier;
};

function shareImage() {
  canvas.toBlob(blob => {
    const file = new File([blob], "match.png", { type: "image/png" });

    if (navigator.share) {
      navigator.share({
        title: "Match Result",
        files: [file]
      });
    } else {
      alert("Sharing not supported on this device");
    }
  });
}
